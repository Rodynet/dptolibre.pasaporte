<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre OS - Pasaporte de Alquiler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-blue: #0055DD;
            --brand-dark: #0D1B4B;
            --brand-cyan: #00D1FF;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #E8EAF0;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-shell {
            width: 100%;
            height: 100vh;
            max-width: 414px;
            margin: 0 auto;
            background: #F0F2F6;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .passport-gradient {
            background: linear-gradient(135deg, #0D1B4B 0%, #0055DD 100%);
        }

        .logo-font {
            letter-spacing: -0.05em;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- COMPONENTES DE MARCA ---
        const Logo = ({ light = false, size = "md" }) => (
            <div className={`flex flex-col items-center ${light ? 'text-white' : 'text-[#0D1B4B]'}`}>
                <svg width={size === "lg" ? "56" : "32"} viewBox="0 0 32 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 0L32 6.4V33.6L16 40V6.4L16 0Z" fill={light ? "white" : "#0055DD"} fillOpacity="0.3"/>
                    <path d="M0 6.4L16 0V33.6L0 40V6.4Z" fill={light ? "white" : "#0055DD"}/>
                </svg>
                <div className={`logo-font ${size === "lg" ? 'text-2xl mt-2' : 'text-lg mt-1'}`}>
                    dpto <span className="font-light">libre</span>
                </div>
            </div>
        );

        function DptoLibreApp() {
            const [view, setView] = useState('splash'); // splash, onboarding, passport, home
            const [overlay, setOverlay] = useState(null);
            
            // --- FLUJO DE PANTALLAS ---

            if (view === 'splash') return (
                <div className="mobile-shell bg-[#0055DD] flex flex-col justify-center items-center p-10 text-center animate-in">
                    <Logo light size="lg" />
                    <p className="text-white/70 mt-4 text-sm font-medium">Alquilá sin fiador.<br/>Tu reputación es tu aval.</p>
                    <div className="w-full mt-12 space-y-4">
                        <button onClick={() => setView('onboarding')} className="w-full bg-white text-[#0055DD] py-4 rounded-xl font-bold text-sm shadow-xl">Crear mi Pasaporte</button>
                        <button onClick={() => setView('home')} className="w-full bg-transparent border border-white/40 text-white py-4 rounded-xl font-bold text-sm">Ya tengo cuenta</button>
                    </div>
                </div>
            );

            if (view === 'onboarding') return (
                <div className="mobile-shell bg-white flex flex-col animate-in">
                    <header className="p-6 bg-[#0055DD] text-white relative">
                        <button onClick={() => setView('splash')} className="mb-4 bg-white/10 p-2 rounded-lg"><Icon name="arrow-left" size={18}/></button>
                        <h2 className="text-xl font-extrabold uppercase tracking-tighter">Validación Autónoma</h2>
                        <p className="text-white/60 text-xs mt-1">Paso 1 de 3: Identidad Infoexperto</p>
                        <div className="absolute bottom-0 left-0 w-full h-1 bg-black/10">
                            <div className="w-1/3 h-full bg-[#00D1FF]"></div>
                        </div>
                    </header>
                    <main className="flex-1 p-8 space-y-8 overflow-y-auto no-scrollbar text-center">
                        <div className="w-full aspect-video bg-slate-900 rounded-2xl relative overflow-hidden flex flex-col items-center justify-center border-2 border-[#0055DD]/30">
                            <Icon name="scan-face" size={48} className="text-[#00D1FF] animate-pulse" />
                            <div className="absolute top-4 left-4 flex gap-2">
                                <div className="w-2 h-2 rounded-full bg-emerald-500"></div>
                                <span className="text-[8px] text-white font-bold uppercase tracking-widest">En vivo</span>
                            </div>
                            <p className="text-white/40 text-[10px] uppercase font-black mt-4">Encuadrá tu DNI</p>
                        </div>
                        <div className="text-left space-y-2">
                            <h3 className="font-bold text-slate-800 uppercase tracking-tighter">¿Por qué validamos?</h3>
                            <p className="text-xs text-slate-500 leading-relaxed">DptoLibre utiliza tecnología biométrica para asegurar que vos sos vos, eliminando la necesidad de trámites presenciales.</p>
                        </div>
                        <button onClick={() => setView('passport')} className="w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-200">Confirmar Identidad</button>
                    </main>
                </div>
            );

            if (view === 'passport') return (
                <div className="mobile-shell bg-[#F0F2F6] flex flex-col animate-in overflow-y-auto no-scrollbar pb-24">
                    <header className="p-8 bg-white border-b border-slate-100 flex justify-between items-center sticky top-0 z-20">
                        <Logo />
                        <div className="flex gap-2">
                            <Icon name="bell" className="text-slate-400" />
                            <Icon name="settings" className="text-slate-400" />
                        </div>
                    </header>
                    <main className="p-6 space-y-6">
                        <div className="text-center">
                            <h2 className="text-2xl font-black text-[#0D1B4B] tracking-tighter uppercase">Tu Pasaporte</h2>
                            <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">Capacidad de Alquiler Confirmada</p>
                        </div>

                        {/* PASAPORTE CARD */}
                        <div className="passport-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
                            <Icon name="shield-check" size={140} className="absolute right-[-30px] top-[-30px] opacity-10" />
                            <div className="flex justify-between items-start mb-10">
                                <div>
                                    <p className="text-[10px] font-black uppercase tracking-widest text-[#00D1FF]">Veredicto DptoLibre</p>
                                    <h3 className="text-xl font-extrabold mt-1">Marcos Galperin</h3>
                                </div>
                                <div className="bg-white/20 p-2 rounded-xl backdrop-blur-md">
                                    <Icon name="qr-code" size={24} />
                                </div>
                            </div>
                            <p className="text-[10px] font-bold opacity-60 uppercase tracking-widest">Habilitado para alquilar hasta</p>
                            <h2 className="text-5xl font-black tracking-tighter">$550.000<span className="text-lg opacity-40 font-normal">/mes</span></h2>
                            
                            <div className="mt-8 pt-6 border-t border-white/10 grid grid-cols-2 gap-4">
                                <div>
                                    <p className="text-[8px] font-bold opacity-50 uppercase">Vigencia</p>
                                    <p className="text-xs font-bold uppercase">30 Días</p>
                                </div>
                                <div>
                                    <p className="text-[8px] font-bold opacity-50 uppercase">Garantía</p>
                                    <p className="text-xs font-bold uppercase text-[#00D1FF]">Pre-aprobada</p>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col gap-6">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500"><Icon name="user-check"/></div>
                                <div className="flex-1">
                                    <h4 className="font-black text-slate-800 text-sm uppercase leading-none">Perfil Platinum</h4>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">Rental Score: 890</p>
                                </div>
                                <Icon name="chevron-right" className="text-slate-200" />
                            </div>
                            <button className="w-full bg-[#0D1B4B] text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] flex items-center justify-center gap-2">
                                <Icon name="share-2" size={14} /> Compartir Pasaporte
                            </button>
                        </div>

                        <div className="bg-[#EEF3FF] p-6 rounded-[2rem] border border-[#0055DD]/10 flex gap-4">
                            <Icon name="info" className="text-[#0055DD] shrink-0" />
                            <p className="text-[10px] text-[#0055DD] font-bold leading-relaxed">
                                Este pasaporte te permite reservar propiedades sin presentar papeles físicos. Tu solvencia ya fue validada.
                            </p>
                        </div>
                    </main>

                    {/* Nav */}
                    <nav className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around p-6 pb-10">
                        <button onClick={() => setView('home')} className="text-slate-300"><Icon name="home" /></button>
                        <button onClick={() => setView('passport')} className="text-[#0055DD]"><Icon name="user-circle" strokeWidth={3} /></button>
                        <button className="text-slate-300"><Icon name="search" /></button>
                        <button className="text-slate-300"><Icon name="wallet" /></button>
                    </nav>
                </div>
            );

            if (view === 'home') return (
                <div className="mobile-shell bg-[#F0F2F6] flex flex-col animate-in overflow-y-auto no-scrollbar pb-32">
                    <header className="p-8 bg-white border-b border-slate-100 flex justify-between items-center sticky top-0 z-20">
                        <Logo />
                        <Icon name="bell" className="text-slate-400" />
                    </header>
                    <main className="p-6 space-y-6">
                        {/* Status Alquiler */}
                        <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
                            <Icon name="clock" size={120} className="absolute right-[-20px] bottom-[-20px] opacity-5 text-[#00D1FF]" />
                            <span className="text-[10px] font-black bg-[#00D1FF] text-[#0D1B4B] px-3 py-1 rounded-full uppercase tracking-widest">En proceso de mudanza</span>
                            <h3 className="text-2xl font-black mt-6 leading-tight">Caseros 1230, 4B</h3>
                            <p className="text-xs text-slate-400 mt-2">Inmobiliaria: Raíces Propiedades</p>
                            
                            <div className="mt-8 flex items-center justify-between">
                                <div>
                                    <p className="text-[8px] font-black opacity-50 uppercase tracking-widest">Primer Pago</p>
                                    <p className="text-lg font-black">$450.000</p>
                                </div>
                                <button className="bg-white text-slate-900 px-6 py-3 rounded-xl font-black text-[10px] uppercase">Pagar y Firmar</button>
                            </div>
                        </div>

                        {/* Rampa a Casa Propia */}
                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden">
                            <Icon name="trending-up" className="absolute right-4 top-4 text-emerald-500" />
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Camino a tu Casa Propia</p>
                            <div className="flex justify-between text-[10px] font-black uppercase mb-2">
                                <span className="text-emerald-600">Nivel Platinum</span>
                                <span className="text-slate-300">Meta: 1000 pts</span>
                            </div>
                            <div className="h-4 bg-slate-50 rounded-full overflow-hidden mb-6 border border-slate-100 p-1">
                                <div className="h-full bg-gradient-to-r from-[#0055DD] to-emerald-400 rounded-full" style={{ width: '82%' }}></div>
                            </div>
                            <p className="text-xs text-slate-500 font-medium italic">"Estás a 2 pagos blindados de calificar para tu primer crédito hipotecario."</p>
                        </div>
                    </main>

                    {/* Nav */}
                    <nav className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around p-6 pb-10">
                        <button onClick={() => setView('home')} className="text-[#0055DD]"><Icon name="home" strokeWidth={3} /></button>
                        <button onClick={() => setView('passport')} className="text-slate-300"><Icon name="user-circle" /></button>
                        <button className="text-slate-300"><Icon name="search" /></button>
                        <button className="text-slate-300"><Icon name="wallet" /></button>
                    </nav>
                </div>
            );

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DptoLibreApp />);
    </script>
</body>
</html>
