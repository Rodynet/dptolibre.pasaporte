<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre - Pasaporte Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { --brand-blue: #0055DD; --brand-dark: #0D1B4B; --brand-cyan: #00D1FF; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #E8EAF0; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .mobile-shell { width: 100%; height: 100vh; max-width: 414px; margin: 0 auto; background: #F0F2F6; position: relative; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .passport-gradient { background: linear-gradient(135deg, #0D1B4B 0%, #0055DD 100%); }
        .face-guide { width: 200px; height: 200px; border: 2px solid var(--brand-cyan); border-radius: 50%; position: relative; }
        .logo-font { letter-spacing: -0.05em; font-weight: 800; }
        .blur-locked { filter: grayscale(1) opacity(0.4); pointer-events: none; }
        
        /* Colores Sociales Específicos */
        .btn-google { background: #FFFFFF; color: #757575; border: 1px solid #E5E7EB; }
        .btn-apple { background: #000000; color: #FFFFFF; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Logo = ({ light = false, size = "md" }) => (
            <div className={`flex flex-col items-center ${light ? 'text-white' : 'text-[#0D1B4B]'}`}>
                <svg width={size === "lg" ? "56" : "32"} viewBox="0 0 32 40" fill="none">
                    <path d="M16 0L32 6.4V33.6L16 40V6.4L16 0Z" fill={light ? "white" : "#0055DD"} fillOpacity="0.3"/>
                    <path d="M0 6.4L16 0V33.6L0 40V6.4Z" fill={light ? "white" : "#0055DD"}/>
                </svg>
                <div className={`logo-font ${size === "lg" ? 'text-2xl mt-2' : 'text-lg mt-1'}`}>
                    dpto <span className="font-light">libre</span>
                </div>
            </div>
        );

        function DptoLibreApp() {
            const [view, setView] = useState('login'); 
            const [valStep, setValStep] = useState(1);
            const [isFirstRental, setIsFirstRental] = useState(false);
            const [isScanning, setIsScanning] = useState(false);

            const handleNext = () => {
                if (valStep < 5) setValStep(valStep + 1);
                else setView('home');
            };

            const skipStep = () => {
                // Lógica de reducción de score figurativa
                handleNext();
            };

            // --- PANTALLA 1: LOGIN / REGISTRO ---
            const LoginScreen = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 justify-center animate-in">
                    <div className="mb-12 text-center">
                        <Logo size="lg" />
                        <h1 className="text-2xl font-black mt-8 text-[#0D1B4B] uppercase tracking-tighter leading-none">Tu Pasaporte Digital</h1>
                        <p className="text-slate-400 text-sm mt-3 font-medium">Gestioná tu alquiler con libertad.</p>
                    </div>

                    <div className="space-y-4 w-full">
                        <button onClick={() => setView('role_selection')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold btn-google shadow-sm transition-all active:scale-95">
                            <svg width="20" height="20" viewBox="0 0 24 24">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.26 1.07-3.71 1.07-2.87 0-5.3-1.94-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.09H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.91l3.66-2.8z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.09l3.66 2.8c.86-2.59 3.29-4.51 6.16-4.51z" fill="#EA4335"/>
                            </svg>
                            Continuar con Google
                        </button>
                        <button onClick={() => setView('role_selection')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold btn-apple shadow-lg transition-all active:scale-95">
                            <Icon name="apple" size={20} className="fill-white"/> Continuar con Apple
                        </button>
                        
                        <div className="flex items-center gap-4 py-4">
                            <div className="h-[1px] flex-1 bg-slate-100"></div>
                            <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">o con tu cuenta</span>
                            <div className="h-[1px] flex-1 bg-slate-100"></div>
                        </div>

                        <input type="email" placeholder="Email" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-medium focus:ring-2 focus:ring-[#0055DD] outline-none" />
                        <input type="password" placeholder="Contraseña" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-medium focus:ring-2 focus:ring-[#0055DD] outline-none" />
                        
                        <button onClick={() => setView('role_selection')} className="w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl mt-4">Ingresar</button>
                    </div>
                </div>
            );

            // --- PANTALLA 2: SELECCIÓN DE ROL ---
            const RoleSelection = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 animate-in">
                    <header className="mb-12 pt-10 text-center">
                        <h2 className="text-3xl font-black text-[#0D1B4B] tracking-tighter leading-none">¿Cómo vas a usar DptoLibre?</h2>
                        <p className="text-slate-400 text-sm mt-4 font-medium">Elegí tu perfil para comenzar.</p>
                    </header>
                    <div className="space-y-4 flex-1">
                        {[
                            { id: 'inq', label: 'Inquilino', desc: 'Busco alquilar o ya alquilo.', icon: 'user' },
                            { id: 'prop', label: 'Propietario', desc: 'Tengo propiedades para cobrar.', icon: 'shield' },
                            { id: 'adm', label: 'Administrador', desc: 'Gestiono carteras inmobiliarias.', icon: 'building' }
                        ].map(role => (
                            <button key={role.id} onClick={() => setView('passport_invite')} className="w-full p-6 border-2 border-slate-50 rounded-[2.5rem] text-left flex items-center gap-5 hover:border-[#0055DD] hover:bg-blue-50/30 transition-all group">
                                <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 group-hover:bg-[#0055DD] group-hover:text-white transition-all"><Icon name={role.icon} /></div>
                                <div className="flex-1">
                                    <h4 className="font-black text-[#0D1B4B] uppercase text-sm">{role.label}</h4>
                                    <p className="text-xs text-slate-400 font-medium">{role.desc}</p>
                                </div>
                                <Icon name="chevron-right" className="text-slate-200 group-hover:text-[#0055DD]" />
                            </button>
                        ))}
                    </div>
                </div>
            );

            // --- PANTALLA 3: INVITACIÓN PASAPORTE (OBLIGATORIA) ---
            const PassportInvite = () => (
                <div className="mobile-shell passport-gradient flex flex-col justify-center items-center p-12 text-center text-white animate-in">
                    <Logo light size="lg" />
                    <h2 className="text-3xl font-black mt-12 uppercase tracking-tighter leading-none">Obtené tu Pasaporte</h2>
                    <p className="text-white/60 text-sm mt-6 leading-relaxed">Para operar en la plataforma, primero debés validar tu identidad y solvencia financiera.</p>
                    <button onClick={() => setView('validation_wizard')} className="w-full bg-[#00D1FF] text-[#0D1B4B] py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl mt-12">Empezar Validación</button>
                    <p className="mt-8 text-[10px] text-white/30 uppercase font-black tracking-widest">Validación Biométrica Oficial</p>
                </div>
            );

            // --- PANTALLA 4: MAGO DE VALIDACIÓN (DETALLADO) ---
            const ValidationWizard = () => {
                const steps = [
                    { id: 1, title: "DNI: Frente", desc: "Escaneo de identidad" },
                    { id: 2, title: "DNI: Dorso", desc: "Seguridad de documento" },
                    { id: 3, title: "Prueba de Vida", desc: "Biometría facial" },
                    { id: 4, title: "Tus Ingresos", desc: "Recibos propios o de terceros" },
                    { id: 5, title: "Tu Historial", desc: "Trayectoria de alquiler" }
                ];

                return (
                    <div className="mobile-shell bg-white flex flex-col animate-in">
                        <header className="p-8 pb-4">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => setValStep(valStep > 1 ? valStep - 1 : 1)} className="p-2 bg-slate-50 rounded-xl text-slate-300"><Icon name="arrow-left" size={18}/></button>
                                <span className="text-[10px] font-black uppercase text-slate-300 tracking-widest">Paso {valStep} de 5</span>
                            </div>
                            <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-none">{steps[valStep-1].title}</h2>
                            <p className="text-slate-400 text-xs font-bold mt-2 uppercase tracking-widest opacity-60">{steps[valStep-1].desc}</p>
                        </header>

                        <main className="flex-1 p-8 flex flex-col no-scrollbar overflow-y-auto">
                            {/* PASO 1 & 2: DNI */}
                            {(valStep === 1 || valStep === 2) && (
                                <div className="space-y-8 flex-1 flex flex-col justify-center">
                                    <div className="w-full aspect-[3/2] bg-slate-900 rounded-[2.5rem] border-4 border-[#0055DD]/10 relative flex flex-col items-center justify-center overflow-hidden shadow-2xl">
                                        <div className="w-full h-1 bg-[#00D1FF]/40 absolute top-1/2"></div>
                                        <Icon name="camera" className="text-white opacity-20" size={48} />
                                        <p className="absolute bottom-4 text-[8px] font-black text-white/40 uppercase tracking-widest">Encuadre el {valStep === 1 ? 'frente' : 'dorso'}</p>
                                    </div>
                                    <div className="bg-blue-50 p-6 rounded-3xl border border-blue-100">
                                        <p className="text-xs text-[#0055DD] font-bold leading-relaxed">DptoLibre detectará tus datos automáticamente mediante OCR inteligente.</p>
                                    </div>
                                </div>
                            )}

                            {/* PASO 3: BIOMETRÍA */}
                            {valStep === 3 && (
                                <div className="space-y-8 flex-1 flex flex-col items-center justify-center">
                                    <div className="face-guide flex items-center justify-center bg-slate-50 overflow-hidden border-4 border-dashed border-indigo-200">
                                        <Icon name="user" className="text-slate-200" size={100} />
                                    </div>
                                    <div className="text-center">
                                        <h4 className="font-black text-[#0D1B4B] uppercase text-sm">Girá la cabeza lentamente</h4>
                                        <p className="text-xs text-slate-400 mt-2">Validando que seas una persona real.</p>
                                    </div>
                                </div>
                            )}

                            {/* PASO 4: INGRESOS (DISTRIBUIDO) */}
                            {valStep === 4 && (
                                <div className="space-y-6 flex-1">
                                    <div className="p-6 bg-slate-50 rounded-3xl border border-slate-100 space-y-4">
                                        <h4 className="font-black text-[#0D1B4B] text-xs uppercase tracking-widest">Mis Recibos</h4>
                                        <button className="w-full p-4 border-2 border-dashed border-indigo-200 rounded-2xl flex items-center justify-center gap-2 text-indigo-400 font-bold text-xs uppercase"><Icon name="plus" size={16}/> Subir mis PDF</button>
                                    </div>

                                    <div className="p-6 bg-indigo-50 rounded-3xl border border-indigo-100 space-y-4">
                                        <h4 className="font-black text-indigo-900 text-xs uppercase tracking-widest leading-none">Garantía de Terceros</h4>
                                        <p className="text-[10px] text-indigo-500 font-medium leading-relaxed">¿Vas a presentar recibos de otros o una propiedad? Enviáles un link para que carguen todo por vos.</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button className="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center gap-2 group"><Icon name="file-text" size={18} className="text-indigo-400"/><span className="text-[8px] font-black text-slate-500 uppercase">Recibos</span></button>
                                            <button className="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center gap-2 group"><Icon name="building" size={18} className="text-indigo-400"/><span className="text-[8px] font-black text-slate-500 uppercase">Propiedad</span></button>
                                        </div>
                                        <button className="w-full bg-[#0D1B4B] text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2"><Icon name="share-2" size={12}/> Compartir Link de Invitación</button>
                                    </div>
                                </div>
                            )}

                            {/* PASO 5: HISTORIAL */}
                            {valStep === 5 && (
                                <div className="space-y-8 flex-1 flex flex-col justify-center">
                                    <div 
                                        onClick={() => setIsFirstRental(!isFirstRental)}
                                        className={`p-6 border-2 rounded-[2rem] flex items-center gap-4 transition-all cursor-pointer ${isFirstRental ? 'bg-emerald-50 border-emerald-500' : 'bg-slate-50 border-slate-100'}`}
                                    >
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center ${isFirstRental ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-400'}`}><Icon name="check" size={16}/></div>
                                        <div className="flex-1">
                                            <h4 className="font-black text-slate-800 text-xs uppercase">Es mi primer alquiler</h4>
                                            <p className="text-[10px] text-slate-400 font-bold mt-1">Habilitar modo aspirante.</p>
                                        </div>
                                    </div>

                                    {!isFirstRental && (
                                        <div className="space-y-4 animate-in">
                                            <input type="text" placeholder="Dirección del último hogar" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-bold focus:ring-2 focus:ring-[#0055DD]" />
                                            <input type="text" placeholder="Referencia Inmobiliaria / Dueño" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-bold focus:ring-2 focus:ring-[#0055DD]" />
                                        </div>
                                    )}
                                </div>
                            )}

                            <footer className="mt-8 space-y-4">
                                <button onClick={handleNext} className="w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Continuar</button>
                                {valStep >= 4 && (
                                    <button onClick={skipStep} className="w-full py-2 text-slate-400 font-bold text-[10px] uppercase tracking-widest flex items-center justify-center gap-1"><Icon name="alert-triangle" size={12}/> Saltar paso (afecta tu Score)</button>
                                )}
                            </footer>
                        </main>
                    </div>
                );
            }

            // --- HOME VIEW: EL PASAPORTE EN USO ---
            const HomeView = () => (
                <div className="mobile-shell bg-[#F0F2F6] flex flex-col animate-in overflow-y-auto no-scrollbar pb-32">
                    <header className="p-8 bg-white border-b flex justify-between items-center sticky top-0 z-20 shadow-sm">
                        <Logo />
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full border-2 border-[#0055DD] bg-slate-100 overflow-hidden"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Marcos" /></div>
                        </div>
                    </header>

                    <main className="p-6 space-y-6">
                        {/* 1. EL PASAPORTE DIGITAL (TARJETA AZUL) */}
                        <div className="passport-gradient p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden flex flex-col gap-8">
                            <Icon name="shield-check" size={150} className="absolute right-[-40px] top-[-40px] opacity-10" />
                            <div>
                                <p className="text-[10px] font-black uppercase text-[#00D1FF] tracking-widest">Pasaporte de Alquiler</p>
                                <h2 className="text-5xl font-black tracking-tighter mt-1">$550.000</h2>
                                <p className="text-[10px] font-bold opacity-60 uppercase mt-1">Capacidad Mensual Validada</p>
                            </div>
                            
                            <div className="flex flex-col gap-3">
                                <button className="w-full bg-white/10 hover:bg-white/20 transition-all p-4 rounded-2xl backdrop-blur-md border border-white/10 flex items-center justify-center gap-3 font-black text-xs uppercase tracking-widest">
                                    <Icon name="share-2" size={16} className="text-[#00D1FF]" /> Compartir Pasaporte
                                </button>
                                <div className="flex items-center justify-between bg-white p-5 rounded-3xl shadow-lg">
                                    <div className="flex flex-col">
                                        <span className="text-[8px] font-black uppercase text-slate-400">ID Digital Único</span>
                                        <span className="text-[10px] font-black text-[#0D1B4B] uppercase tracking-tighter mt-1">DptoLibre-V51</span>
                                    </div>
                                    <div className="bg-[#EEF3FF] p-2 rounded-xl"><Icon name="qr-code" size={32} className="text-[#0D1B4B]" /></div>
                                </div>
                            </div>
                        </div>

                        {/* 2. ESPERANDO CONTRATO (ESTADO INICIAL) */}
                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 text-center space-y-6 shadow-sm">
                            <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto text-slate-300"><Icon name="file-search" size={32} /></div>
                            <div>
                                <h4 className="font-black text-[#0D1B4B] uppercase text-sm tracking-tight">Vincular Contrato</h4>
                                <p className="text-xs text-slate-400 mt-2 leading-relaxed">¿Ya encontraste tu departamento? Escaneá el código QR que te envió la inmobiliaria.</p>
                            </div>
                            <button className="w-full bg-[#0055DD] text-white py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest shadow-xl flex items-center justify-center gap-3">
                                <Icon name="qr-code" size={18}/> ESCANEAR QR DE INMOBILIARIA
                            </button>
                        </div>

                        {/* 3. FUNCIONES BLOQUEADAS */}
                        <div className="space-y-4">
                            <div className="flex justify-between items-center px-2">
                                <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Gestión del Hogar</h4>
                                <div className="flex items-center gap-1 text-slate-300"><Icon name="lock" size={12}/><span className="text-[8px] font-black uppercase">Bloqueado</span></div>
                            </div>
                            <div className="grid grid-cols-2 gap-4 blur-locked">
                                <div className="bg-white p-6 rounded-[2rem] border shadow-sm flex flex-col gap-3"><Icon name="wrench" className="text-slate-300" /><p className="text-[10px] font-black text-slate-800 uppercase">Tickets</p></div>
                                <div className="bg-white p-6 rounded-[2rem] border shadow-sm flex flex-col gap-3"><Icon name="camera" className="text-slate-300" /><p className="text-[10px] font-black text-slate-800 uppercase">Bitácora</p></div>
                            </div>
                        </div>
                    </main>

                    <nav className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t p-6 pb-10 flex justify-around">
                        <Icon name="home" className="text-[#0055DD]" strokeWidth={3}/>
                        <Icon name="search" className="text-slate-300" />
                        <Icon name="wallet" className="text-slate-300" />
                        <Icon name="user" className="text-slate-300" />
                    </nav>
                </div>
            );

            return (
                <div className="h-screen w-full flex flex-col items-center justify-center p-4">
                    <div className="mobile-shell">
                        {/* Notch */}
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-7 bg-[#0D1B4B] rounded-b-3xl z-[150] flex items-center justify-center gap-2">
                            <div className="w-1.5 h-1.5 rounded-full bg-white/20"></div>
                            <div className="w-10 h-1 bg-white/20 rounded-full"></div>
                        </div>

                        {view === 'login' && <LoginScreen />}
                        {view === 'role_selection' && <RoleSelection />}
                        {view === 'passport_invite' && <PassportInvite />}
                        {view === 'validation_wizard' && <ValidationWizard />}
                        {view === 'home' && <HomeView />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DptoLibreApp />);
    </script>
</body>
</html>
