<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre - Pasaporte y Contrato</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { --brand-blue: #0055DD; --brand-dark: #0D1B4B; --brand-cyan: #00D1FF; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #E8EAF0; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .mobile-shell { width: 100%; height: 100vh; max-width: 414px; margin: 0 auto; background: #F0F2F6; position: relative; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .passport-gradient { background: linear-gradient(135deg, #0D1B4B 0%, #0055DD 100%); }
        .face-guide { width: 220px; height: 220px; border: 4px solid var(--brand-cyan); border-radius: 50%; position: relative; box-shadow: 0 0 0 1000px rgba(0,0,0,0.7); }
        .logo-font { letter-spacing: -0.05em; font-weight: 800; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Logo = ({ light = false, size = "md" }) => (
            <div className={`flex flex-col items-center ${light ? 'text-white' : 'text-[#0D1B4B]'}`}>
                <svg width={size === "lg" ? "56" : "32"} viewBox="0 0 32 40" fill="none">
                    <path d="M16 0L32 6.4V33.6L16 40V6.4L16 0Z" fill={light ? "white" : "#0055DD"} fillOpacity="0.3"/>
                    <path d="M0 6.4L16 0V33.6L0 40V6.4Z" fill={light ? "white" : "#0055DD"}/>
                </svg>
                <div className={`logo-font ${size === "lg" ? 'text-2xl mt-2' : 'text-lg mt-1'}`}>
                    dpto <span className="font-light">libre</span>
                </div>
            </div>
        );

        function DptoLibreApp() {
            // VIEWS: login, role, val_dni_f, val_dni_d, val_face, val_income, val_guarantee, val_third_party, val_surety_offers, val_history, contract_bridge, contract_linked, link_bank, move_in_payment, signature, home
            const [view, setView] = useState('login'); 
            const [isScanning, setIsScanning] = useState(false);
            const [isFirstRental, setIsFirstRental] = useState(false);
            
            // Datos de Negocio
            const [rentIntent, setRentIntent] = useState(450000); 
            const [incomeTotal, setIncomeTotal] = useState(0); 
            const [thirdPartyIncome, setThirdPartyIncome] = useState(0);
            const [hasSuretyBond, setHasSuretyBond] = useState(false);

            const handleTransition = (nextView, delay = 1500) => {
                setIsScanning(true);
                setTimeout(() => {
                    setIsScanning(false);
                    setView(nextView);
                }, delay);
            };

            const personalCapacity = incomeTotal * 0.3;
            const totalCapacity = (incomeTotal + thirdPartyIncome) * 0.3;
            const needsSurety = rentIntent > totalCapacity;

            // --- VISTAS DE ACCESO ---

            const LoginView = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 justify-center animate-in">
                    <div className="mb-12 text-center">
                        <Logo size="lg" />
                        <h1 className="text-2xl font-black mt-8 text-[#0D1B4B] uppercase tracking-tighter leading-none">Bienvenido</h1>
                        <p className="text-slate-400 text-sm mt-3 font-medium px-4">Ingresá a tu pasaporte digital de alquiler.</p>
                    </div>
                    <div className="space-y-3 w-full">
                        <button onClick={() => setView('role')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold bg-white border border-slate-200 text-slate-700 shadow-sm active:scale-95 transition-all">
                            <Icon name="chrome" size={20} className="text-blue-500" /> Continuar con Google
                        </button>
                        <button onClick={() => setView('role')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold bg-black text-white shadow-lg active:scale-95 transition-all"><Icon name="apple" size={20} className="fill-white"/> Continuar con Apple</button>
                        <div className="py-6 flex items-center gap-4"><div className="h-[1px] flex-1 bg-slate-100"></div><span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">o con email</span><div className="h-[1px] flex-1 bg-slate-100"></div></div>
                        <input type="email" placeholder="Email" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-medium focus:ring-2 focus:ring-[#0055DD] outline-none" />
                        <button onClick={() => setView('role')} className="w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl mt-4">Ingresar</button>
                    </div>
                </div>
            );

            const RoleView = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 animate-in">
                    <header className="mb-12 pt-10 text-center">
                        <h2 className="text-3xl font-black text-[#0D1B4B] tracking-tighter">¿Cómo vas a usar DptoLibre?</h2>
                    </header>
                    <div className="space-y-4 flex-1">
                        {['Inquilino', 'Propietario', 'Administrador'].map((role, i) => (
                            <button key={role} onClick={() => setView('val_dni_f')} className="w-full p-6 border-2 border-slate-50 rounded-[2.5rem] text-left flex items-center gap-5 hover:border-[#0055DD] hover:bg-blue-50/30 transition-all group">
                                <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 group-hover:bg-[#0055DD] group-hover:text-white transition-all"><Icon name={i === 0 ? 'user' : i === 1 ? 'shield' : 'building'} /></div>
                                <div className="flex-1 font-black text-[#0D1B4B] uppercase text-sm">{role}</div>
                                <Icon name="chevron-right" className="text-slate-200 group-hover:text-[#0055DD]" />
                            </button>
                        ))}
                    </div>
                </div>
            );

            // --- VISTAS DE VALIDACIÓN ---

            const DniCapture = ({ side, next }) => (
                <div className="mobile-shell bg-white flex flex-col animate-in">
                    <header className="p-8 pb-4 flex justify-between items-center"><h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter">DNI {side}</h2></header>
                    <main className="flex-1 p-8 flex flex-col justify-center text-center">
                        <div className="w-full aspect-[3/2] bg-slate-900 rounded-[2rem] border-4 border-[#0055DD]/10 relative flex flex-col items-center justify-center overflow-hidden shadow-2xl">
                             <div className="w-full h-1 bg-[#00D1FF]/40 absolute top-1/2"></div>
                             <Icon name="camera" className="text-white opacity-20" size={48} />
                             <p className="absolute bottom-4 text-[8px] font-black text-white/40 uppercase tracking-widest">Encuadre el {side}</p>
                        </div>
                        <button onClick={() => handleTransition(next)} className="mt-auto w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Capturar Foto</button>
                    </main>
                </div>
            );

            const FaceCapture = () => (
                <div className="mobile-shell bg-slate-900 flex flex-col items-center justify-center text-white animate-in">
                    <div className="face-guide flex items-center justify-center"><Icon name="user" size={100} className="text-white/20" /></div>
                    <div className="mt-12 text-center px-10"><h4 className="text-xl font-black uppercase tracking-widest mb-2">Prueba de Vida</h4><p className="text-white/50 text-sm leading-relaxed italic">Parpadeá tres veces frente a la cámara.</p></div>
                    <button onClick={() => handleTransition('val_income')} className="mt-16 bg-[#00D1FF] text-[#0D1B4B] px-12 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl">Iniciar Escaneo</button>
                </div>
            );

            // --- TUS INGRESOS (SEGÚN IMAGEN 1) ---
            const IncomeCapture = () => (
                <div className="mobile-shell bg-white flex flex-col p-8 animate-in overflow-y-auto no-scrollbar pb-32">
                    <header className="mb-6 flex justify-between items-end">
                        <div>
                            <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-none">Tus Ingresos</h2>
                            <p className="text-slate-400 text-xs font-bold uppercase mt-2">Paso 4 de 5</p>
                        </div>
                        <Icon name="file-text" className="text-slate-200" size={40} />
                    </header>
                    
                    <div className="space-y-6 flex-1">
                        <div className="p-6 bg-slate-50 rounded-[2rem] border-2 border-slate-100 space-y-4">
                            <h4 className="font-black text-[#0D1B4B] text-xs uppercase tracking-widest">Mis Recibos</h4>
                            <div className="space-y-3">
                                {['Mes 1 (Actual)', 'Mes 2', 'Mes 3'].map((month, idx) => (
                                    <div key={idx} className="bg-white p-4 rounded-xl border border-slate-200 flex justify-between items-center group hover:border-indigo-400 transition-all">
                                        <span className="text-[10px] font-bold text-slate-500 uppercase">{month}</span>
                                        <button onClick={() => setIncomeTotal(1200000)} className="bg-slate-50 p-2 rounded-lg text-indigo-600 active:scale-90"><Icon name="plus" size={18}/></button>
                                    </div>
                                ))}
                            </div>
                            {incomeTotal > 0 && <p className="text-[9px] text-emerald-600 font-black text-center uppercase tracking-tighter">✓ Promedio Detectado: $1.2M Neto</p>}
                        </div>

                        {incomeTotal > 0 && (
                            <div className={`p-6 rounded-[2.5rem] border-2 transition-all ${rentIntent > personalCapacity ? 'bg-amber-50 border-amber-200' : 'bg-emerald-50 border-emerald-200'}`}>
                                <h4 className="font-black text-slate-800 text-[10px] uppercase mb-1">Tu Poder de Alquiler</h4>
                                <p className="text-xl font-black text-slate-900">${personalCapacity.toLocaleString()}</p>
                                {rentIntent > personalCapacity && <p className="text-[10px] text-amber-700 font-medium mt-2 leading-tight">No alcanzas el monto buscado solo con tus recibos.</p>}
                            </div>
                        )}
                    </div>
                    <button onClick={() => setView('val_guarantee')} className="mt-8 w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Continuar</button>
                </div>
            );

            // --- GARANTÍA DE TERCEROS (SEGÚN IMAGEN 2) ---
            const ThirdPartyGuaranteeView = () => (
                <div className="mobile-shell bg-[#f0f4ff] flex flex-col p-8 justify-center animate-in">
                    <div className="bg-white/60 p-10 rounded-[3rem] border border-white shadow-xl relative overflow-hidden">
                        <Icon name="users" size={100} className="absolute right-[-20px] top-[-20px] opacity-5 text-indigo-900" />
                        <h2 className="text-2xl font-extrabold text-[#2D3142] uppercase tracking-tight mb-4 text-center leading-none">Garantía de Terceros</h2>
                        <p className="text-indigo-500 text-sm font-medium text-center leading-relaxed mb-10 px-4">
                            ¿Vas a presentar recibos de otros o una propiedad? Enviáles un link para que carguen todo por vos.
                        </p>
                        <div className="grid grid-cols-2 gap-4 mb-10">
                            <button onClick={() => { setThirdPartyIncome(800000); setView('val_history'); }} className="bg-white aspect-square rounded-[2rem] shadow-sm flex flex-col items-center justify-center gap-3 border border-slate-50 active:scale-95 transition-all">
                                <div className="text-indigo-400 opacity-60"><Icon name="file-text" size={32} /></div>
                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Recibos</span>
                            </button>
                            <button onClick={() => { setThirdPartyIncome(1000000); setView('val_history'); }} className="bg-white aspect-square rounded-[2rem] shadow-sm flex flex-col items-center justify-center gap-3 border border-slate-50 active:scale-95 transition-all">
                                <div className="text-indigo-400 opacity-60"><Icon name="building-2" size={32} /></div>
                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Propiedad</span>
                            </button>
                        </div>
                        <button onClick={() => alert("Link Copiado")} className="w-full bg-[#0D1B4B] text-white py-5 rounded-3xl font-black text-xs uppercase flex items-center justify-center gap-3 shadow-2xl active:scale-95 mb-4">
                            <Icon name="share-2" size={18} /> Compartir link de invitación
                        </button>
                        <button onClick={() => setView('val_surety_offers')} className="w-full text-indigo-400 font-black text-[10px] uppercase text-center py-2 underline tracking-widest">No tengo garantes tradicionales</button>
                    </div>
                </div>
            );

            // --- MEJORÁ TU PASAPORTE (SEGÚN IMAGEN 3) ---
            const SuretyOffersView = () => (
                <div className="mobile-shell bg-white flex flex-col p-8 animate-in overflow-y-auto no-scrollbar pb-32">
                    <header className="mb-6">
                        <button onClick={() => setView('val_guarantee')} className="text-slate-300 mb-4"><Icon name="arrow-left" size={20}/></button>
                        <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-none">Mejorá tu Pasaporte</h2>
                        <p className="text-slate-400 text-xs font-bold mt-2 uppercase tracking-widest">Cotización en tiempo real</p>
                    </header>
                    <div className="space-y-6">
                        <div className="bg-slate-900 rounded-[2rem] p-6 text-white shadow-xl relative overflow-hidden">
                            <Icon name="calculator" size={60} className="absolute right-[-10px] bottom-[-10px] opacity-10" />
                            <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2">Alquiler que buscas (Manual)</p>
                            <div className="flex items-center gap-1">
                                <span className="text-2xl font-black">$</span>
                                <input type="number" value={rentIntent} onChange={(e) => setRentIntent(e.target.value)} className="bg-transparent text-4xl font-black text-white w-full outline-none" />
                            </div>
                        </div>
                        <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Opciones de caución</h4>
                        {[
                            { name: 'BLINDATO INSURANCE', price: '450.000', label: 'MÁS ELEGIDA', icon: 'shield-check', color: 'text-indigo-600' },
                            { name: 'GARANTÍA YA', price: '472.000', label: 'FIRMA EN 1H', icon: 'zap', color: 'text-amber-500' }
                        ].map((opt, i) => (
                            <div key={i} onClick={() => { setHasSuretyBond(true); setView('val_history'); }} className="p-5 border-2 border-slate-50 rounded-[2rem] bg-white flex justify-between items-center shadow-sm cursor-pointer hover:border-indigo-100 transition-all">
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center"><Icon name={opt.icon} className={opt.color} size={20}/></div>
                                    <div>
                                        <p className="text-xs font-black text-slate-800 uppercase leading-none">{opt.name}</p>
                                        <p className="text-[9px] text-emerald-500 font-black mt-1 uppercase tracking-tighter">{opt.label}</p>
                                    </div>
                                </div>
                                <p className="text-sm font-black text-slate-700">${opt.price}</p>
                            </div>
                        ))}
                    </div>
                    <button onClick={() => setView('val_history')} className="mt-8 text-slate-400 font-bold text-[10px] uppercase text-center underline">Seguir sin caución</button>
                </div>
            );

            // --- VINCULACIÓN Y CIERRE (SEGÚN IMAGEN 4 Y 5) ---

            const ContractBridgeView = () => (
                <div className="mobile-shell bg-white flex flex-col p-8 justify-center animate-in">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-50 flex flex-col items-center text-center">
                        <div className="w-20 h-20 bg-slate-50 rounded-2xl flex items-center justify-center mb-10 text-slate-200"><Icon name="file-search" size={40} /></div>
                        <h2 className="text-xl font-black text-slate-900 uppercase tracking-tight mb-8">Vincular mi contrato</h2>
                        <button onClick={() => handleTransition('contract_linked')} className="w-full bg-[#0055DD] text-white py-5 rounded-[2.5rem] font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all">
                             <Icon name="qr-code" size={18} /> Escanear QR de Inmobiliaria
                        </button>
                    </div>
                </div>
            );

            const ContractLinkedView = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 justify-center text-center animate-in">
                    <div className="relative mb-8">
                        <div className="w-20 h-20 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto text-indigo-500 shadow-inner"><Icon name="file-text" size={32}/></div>
                        <div className="absolute top-0 right-[35%] bg-emerald-500 text-white p-1 rounded-full border-4 border-white shadow-md"><Icon name="check" size={14} strokeWidth={4}/></div>
                    </div>
                    <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-tight leading-none">¡Contrato Vinculado!</h2>
                    <p className="text-slate-400 text-xs font-medium mt-4 leading-relaxed">Detectamos un contrato activo de Inmobiliaria <b>Raíces</b> asignado a tu perfil.</p>
                    <div className="bg-[#0D1B4B] rounded-[2rem] p-6 mt-8 text-white text-left relative overflow-hidden shadow-2xl">
                         <Icon name="building" size={100} className="absolute right-[-20px] bottom-[-20px] opacity-10" />
                         <p className="text-[10px] font-black uppercase text-indigo-400 mb-1 leading-none">Propiedad</p>
                         <h4 className="text-lg font-bold mb-4 leading-none mt-1">Caseros 1230, 4B</h4>
                         <div className="grid grid-cols-2 gap-4">
                            <div><p className="text-[8px] font-bold opacity-50 uppercase">Alquiler</p><p className="text-sm font-black text-emerald-400">$450.000</p></div>
                            <div><p className="text-[8px] font-bold opacity-50 uppercase">Expensas</p><p className="text-sm font-black text-indigo-300">$65.000</p></div>
                         </div>
                    </div>
                    <button onClick={() => setView('link_bank')} className="mt-12 w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Continuar a Cuenta de Pago</button>
                </div>
            );

            // --- CUENTA DE PAGO (SEGÚN IMAGEN 6) ---
            const LinkBankView = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 animate-in">
                    <header className="mb-10 text-center pt-10"><h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-none">Cuenta de Pago</h2><p className="text-slate-400 text-sm mt-2 leading-relaxed">Vinculá el CBU/Alias desde donde pagarás cada mes.</p></header>
                    <div className="space-y-6 flex-1">
                        <div className="space-y-2">
                             <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">CBU o Alias de tu banco</label>
                             <input type="text" placeholder="Ej: marcos.galperin.banco" className="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl text-sm font-bold focus:border-[#0055DD] outline-none" />
                        </div>
                        <div className="bg-emerald-50 p-6 rounded-3xl border border-emerald-100 flex gap-4">
                             <Icon name="shield-check" className="text-emerald-600 shrink-0" size={24}/>
                             <p className="text-[10px] text-emerald-700 font-bold leading-relaxed">Seguridad Blindato: Validamos la titularidad vía COELSA para que los pagos sean 100% digitales y sin errores.</p>
                        </div>
                    </div>
                    <button onClick={() => setView('move_in_payment')} className="w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase shadow-xl">Validar y Seguir</button>
                </div>
            );

            // --- GASTOS DE INGRESO (SEGÚN IMAGEN 7) ---
            const MoveInPaymentView = () => (
                <div className="mobile-shell bg-slate-900 text-white flex flex-col p-10 animate-in overflow-y-auto no-scrollbar">
                    <header className="mb-8"><h2 className="text-2xl font-black uppercase tracking-tighter leading-none">Gastos de Ingreso</h2><p className="text-indigo-400 text-[10px] font-black uppercase tracking-widest mt-1">Liquidación para activación</p></header>
                    <div className="flex-1 space-y-4">
                        {[
                            { l: 'Mes de Adelanto', v: 450000 },
                            { l: 'Módulo Verificación DptoLibre', v: 5000 },
                            { l: 'Honorarios Inmobiliaria', v: 22500 },
                            { l: 'Sello Legal Digital', v: 1200 },
                            ...(hasSuretyBond ? [{ l: 'Garantía Blindato (1ra Cuota)', v: 12500 }] : [])
                        ].map((item, i) => (
                            <div key={i} className="flex justify-between items-center py-4 border-b border-white/10">
                                <span className="text-xs font-bold text-white/50 uppercase tracking-wider">{item.l}</span>
                                <span className="text-sm font-black">${item.v.toLocaleString()}</span>
                            </div>
                        ))}
                        <div className="pt-8 flex justify-between items-center text-emerald-400">
                             <span className="text-xs font-black uppercase tracking-widest">Total a Liquidar</span>
                             <span className="text-3xl font-black">${(478700 + (hasSuretyBond ? 12500 : 0)).toLocaleString()}</span>
                        </div>
                    </div>
                    <button onClick={() => setView('signature')} className="mt-8 w-full bg-[#00D1FF] text-[#0D1B4B] py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Confirmar Pago de Ingreso</button>
                </div>
            );

            // --- FIRMA Y HOME ACTIVA (SEGÚN IMAGEN 8) ---

            const SignatureView = () => (
                <div className="mobile-shell bg-white flex flex-col animate-in">
                    <header className="p-8 border-b border-slate-100 flex justify-between items-center">
                        <h2 className="text-xl font-black text-[#0D1B4B] uppercase tracking-tighter">Firma Digital</h2>
                        <Icon name="lock" size={24} className="text-slate-200"/>
                    </header>
                    <main className="flex-1 overflow-y-auto p-8 space-y-6 bg-slate-50 no-scrollbar">
                        <div className="bg-white p-8 rounded-3xl shadow-sm text-[9px] text-slate-500 font-mono space-y-4 leading-relaxed border border-slate-100">
                             <p className="font-black text-[#0D1B4B] text-center uppercase border-b pb-4 mb-4 leading-none">Contrato de Locación</p>
                             <p>Entre el Sr Roberto Daer (LOCADOR) y el Sr Marcos Galperin (LOCATARIO)...</p>
                             <div className="h-40 flex items-center justify-center border-2 border-dashed border-slate-100 rounded-2xl italic text-[10px] text-slate-300">Deslizá para leer el documento</div>
                             <p>Firmado digitalmente bajo sellado de Infoexperto ID.</p>
                        </div>
                    </main>

                                 <div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none">Próximo Alquiler</p><h4 className="text-lg font-black text-slate-800">Caseros 1230, 4B</h4><p className="text-xs text-slate-400 mt-1">Inmobiliaria Raíces • 05/05</p></div>

            // --- RENDER LOGIC ---
