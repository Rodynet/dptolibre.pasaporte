<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre OS - Ecosistema Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-blue: #0055DD;
            --brand-dark: #0D1B4B;
            --brand-cyan: #00D1FF;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #E8EAF0; -webkit-tap-highlight-color: transparent; }

        .mobile-shell {
            width: 100%; height: 100vh; max-width: 414px; margin: 0 auto;
            background: #F0F2F6; position: relative; overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .passport-gradient { background: linear-gradient(135deg, #0D1B4B 0%, #0055DD 100%); }
        .animate-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .logo-font { letter-spacing: -0.05em; font-weight: 800; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Logo = ({ light = false, size = "md" }) => (
            <div className={`flex flex-col items-center ${light ? 'text-white' : 'text-[#0D1B4B]'}`}>
                <svg width={size === "lg" ? "56" : "32"} viewBox="0 0 32 40" fill="none">
                    <path d="M16 0L32 6.4V33.6L16 40V6.4L16 0Z" fill={light ? "white" : "#0055DD"} fillOpacity="0.3"/>
                    <path d="M0 6.4L16 0V33.6L0 40V6.4Z" fill={light ? "white" : "#0055DD"}/>
                </svg>
                <div className={`logo-font ${size === "lg" ? 'text-2xl mt-2' : 'text-lg mt-1'}`}>
                    dpto <span className="font-light">libre</span>
                </div>
            </div>
        );

        function DptoLibreApp() {
            const [role, setRole] = useState('aspirante'); // aspirante, admin, inquilino_activo
            const [view, setView] = useState('splash'); 
            const [overlay, setOverlay] = useState(null);

            // --- VISTAS DEL ASPIRANTE (PASAPORTE) ---

            const Splash = () => (
                <div className="h-full flex flex-col justify-center items-center p-10 text-center passport-gradient text-white animate-up">
                    <Logo light size="lg" />
                    <h2 className="text-3xl font-black mt-8 leading-none uppercase tracking-tighter">Tu Pasaporte de Alquiler</h2>
                    <p className="opacity-60 text-sm mt-4">Validamos tu solvencia para que alquiles <br/> sin pedir favores a nadie.</p>
                    <div className="w-full mt-12 space-y-4">
                        <button onClick={() => setView('onboarding')} className="w-full bg-white text-[#0D1B4B] py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Obtener mi Pasaporte</button>
                        <button onClick={() => {setRole('admin'); setView('admin_home');}} className="w-full bg-white/10 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest border border-white/20">Soy Inmobiliaria</button>
                    </div>
                </div>
            );

            const Onboarding = () => (
                <div className="h-full flex flex-col bg-white animate-up">
                    <header className="p-8 pb-4">
                        <button onClick={() => setView('splash')}><Icon name="arrow-left" className="text-slate-400"/></button>
                        <h2 className="text-2xl font-black text-[#0D1B4B] mt-6 leading-none uppercase tracking-tighter">Validación Biométrica</h2>
                        <p className="text-slate-400 text-xs font-bold mt-2 uppercase tracking-widest">Paso 1 de 2: Identidad</p>
                    </header>
                    <main className="p-8 flex-1 space-y-8">
                        <div className="w-full aspect-square bg-slate-900 rounded-[2.5rem] flex flex-col items-center justify-center text-white relative overflow-hidden border-4 border-[#0055DD]/20">
                            <Icon name="scan-face" size={64} className="text-[#00D1FF] animate-pulse" />
                            <p className="mt-6 text-[10px] font-black uppercase tracking-widest opacity-40">Posicioná tu rostro</p>
                        </div>
                        <div className="bg-indigo-50 p-6 rounded-3xl border border-indigo-100 flex gap-4">
                            <Icon name="shield-check" className="text-[#0055DD] shrink-0" />
                            <p className="text-[10px] text-[#0055DD] font-bold leading-relaxed">
                                DptoLibre cruza tus datos con Infoexperto para generar un perfil de confianza instantáneo.
                            </p>
                        </div>
                        <button onClick={() => setView('passport_result')} className="w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-blue-200">Finalizar Validación</button>
                    </main>
                </div>
            );

            const PassportResult = () => (
                <div className="h-full flex flex-col bg-[#F0F2F6] animate-up overflow-y-auto no-scrollbar">
                    <header className="p-8 bg-white border-b flex justify-between items-center sticky top-0 z-20">
                        <Logo />
                        <Icon name="bell" className="text-slate-400" />
                    </header>
                    <main className="p-6 space-y-6">
                        <div className="passport-gradient p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                            <Icon name="shield-check" size={150} className="absolute right-[-40px] top-[-40px] opacity-10" />
                            <p className="text-[10px] font-black uppercase text-[#00D1FF] tracking-widest">Capacidad de Alquiler Mensual</p>
                            <h2 className="text-5xl font-black tracking-tighter mt-2">$550.000</h2>
                            <div className="mt-8 pt-6 border-t border-white/10 flex justify-between items-center">
                                <div>
                                    <p className="text-[8px] font-bold opacity-50 uppercase">Veredicto IA</p>
                                    <p className="text-xs font-black uppercase">Apto con Garantía</p>
                                </div>
                                <Icon name="qr-code" size={32} className="opacity-80" />
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm flex flex-col gap-6">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center"><Icon name="user-check"/></div>
                                <div>
                                    <h4 className="font-black text-slate-800 text-sm uppercase">Rental Score: 890</h4>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase">Nivel Platinum</p>
                                </div>
                            </div>
                            <button className="w-full bg-[#0D1B4B] text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg">
                                <Icon name="share-2" size={14} /> Compartir mi Pasaporte
                            </button>
                        </div>

                        <div className="bg-emerald-50 p-6 rounded-3xl border border-emerald-100 flex gap-4">
                            <Icon name="sparkles" className="text-emerald-600 shrink-0" />
                            <p className="text-[10px] text-emerald-700 font-bold leading-relaxed uppercase">
                                ¡Garantía Pre-Aprobada! <br/> Al presentar tu pasaporte, la inmobiliaria sabe que contás con el aval de DptoLibre.
                            </p>
                        </div>
                    </main>
                    <nav className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t p-6 flex justify-around items-center">
                        <Icon name="home" className="text-[#0055DD]" strokeWidth={3}/>
                        <Icon name="search" className="text-slate-300" />
                        <Icon name="wallet" className="text-slate-300" />
                        <Icon name="gift" className="text-slate-300" />
                    </nav>
                </div>
            );

            // --- VISTAS DEL ADMINISTRADOR (RECEPCIÓN Y VEREDICTO) ---

            const AdminHome = () => (
                <div className="h-full flex flex-col bg-slate-50 animate-up overflow-y-auto no-scrollbar">
                    <header className="p-8 bg-white border-b flex justify-between items-end shadow-sm">
                        <div>
                            <h1 className="text-2xl font-black text-[#0D1B4B] tracking-tighter uppercase leading-none">Gestión</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Torre de Control</p>
                        </div>
                        <Icon name="plus" className="text-[#0055DD]" />
                    </header>
                    <main className="p-6 space-y-6">
                        <div className="flex justify-between items-center px-1">
                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pasaportes Recibidos</h4>
                            <span className="bg-amber-100 text-amber-600 px-2 py-0.5 rounded-full text-[8px] font-black uppercase">Nuevos Leads</span>
                        </div>

                        <div onClick={() => setOverlay('admin_verdict')} className="bg-white p-6 rounded-[2rem] border-l-[12px] border-emerald-500 shadow-xl shadow-indigo-100/20 flex flex-col gap-4">
                            <div className="flex justify-between items-start">
                                <div className="flex gap-4">
                                    <div className="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center"><Icon name="user" className="text-[#0055DD]"/></div>
                                    <div>
                                        <h4 className="font-black text-slate-800 text-sm">Marcos Galperin</h4>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Pasaporte Verificado</p>
                                    </div>
                                </div>
                                <div className="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[8px] font-black uppercase">Pre-aprobado</div>
                            </div>
                            <div className="flex justify-between items-center border-t border-slate-50 pt-4">
                                <div>
                                    <p className="text-[9px] font-black text-slate-400 uppercase">Poder de Alquiler</p>
                                    <p className="text-lg font-black text-slate-800">$550.000</p>
                                </div>
                                <button className="bg-[#0D1B4B] text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest">Vincular</button>
                            </div>
                        </div>
                    </main>
                    <nav className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t p-6 flex justify-around">
                        <Icon name="layout-dashboard" className="text-[#0055DD]" strokeWidth={3}/>
                        <Icon name="building-2" className="text-slate-300" />
                        <Icon name="users" className="text-slate-300" />
                        <Icon name="wallet" className="text-slate-300" />
                    </nav>
                </div>
            );

            // --- OVERLAY: VEREDICTO IA (ADMIN) ---

            const AdminVerdict = () => (
                <div className="absolute inset-0 bg-white z-[100] flex flex-col animate-up">
                    <header className="p-8 bg-[#0D1B4B] text-white flex justify-between items-center">
                        <div>
                            <p className="text-[10px] font-black uppercase text-[#00D1FF] tracking-widest">Veredicto IA</p>
                            <h2 className="text-xl font-black uppercase tracking-tighter leading-none">Análisis de Pasaporte</h2>
                        </div>
                        <button onClick={() => setOverlay(null)} className="bg-white/10 p-2 rounded-full"><Icon name="x" size={20}/></button>
                    </header>
                    <div className="flex-1 overflow-y-auto p-8 space-y-10">
                        <div className="flex flex-col items-center text-center">
                            <div className="w-24 h-24 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center border-4 border-emerald-100 mb-4"><Icon name="check-circle" size={48}/></div>
                            <h3 className="text-2xl font-black text-slate-800 tracking-tighter uppercase">Aprobación Sugerida</h3>
                            <p className="text-xs text-slate-400 font-bold mt-1 uppercase tracking-widest">Inquilino Platinum</p>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-slate-50 p-6 rounded-3xl border text-center">
                                <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Score Infoexperto</p>
                                <p className="text-2xl font-black text-[#0055DD]">890</p>
                            </div>
                            <div className="bg-slate-50 p-6 rounded-3xl border text-center">
                                <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Ratio Solvencia</p>
                                <p className="text-2xl font-black text-slate-800">3.5x</p>
                            </div>
                        </div>

                        <div className="bg-emerald-50 p-8 rounded-[2.5rem] border border-emerald-100 text-center">
                            <h4 className="text-lg font-black text-emerald-900 uppercase tracking-tight mb-2">Máquina de Ventas</h4>
                            <p className="text-xs text-emerald-700 font-medium mb-6 leading-relaxed italic">
                                "El aspirante ya cuenta con pre-aprobación de Garantía DptoLibre. Podés cerrar el contrato hoy mismo."
                            </p>
                            <button className="w-full bg-emerald-500 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-emerald-500/20">Vender Garantía (+$15.000)</button>
                        </div>

                        <div className="pt-8 flex gap-4">
                            <button onClick={() => setOverlay(null)} className="flex-1 bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl">Vincular a Propiedad</button>
                            <button onClick={() => setOverlay(null)} className="p-5 bg-slate-100 text-slate-400 rounded-2xl"><Icon name="trash" size={20}/></button>
                        </div>
                    </div>
                </div>
            );

            // --- LÓGICA DE NAVEGACIÓN ---

            return (
                <div className="h-screen w-full flex flex-col items-center justify-center p-4 bg-slate-200 overflow-hidden">
                    <div className="mobile-shell">
                        {/* Notch Mobile */}
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-7 bg-[#0D1B4B] rounded-b-3xl z-[150] flex items-center justify-center gap-2">
                            <div className="w-1.5 h-1.5 rounded-full bg-white/20"></div>
                            <div className="w-10 h-1 bg-white/20 rounded-full"></div>
                        </div>

                        {view === 'splash' && <Splash />}
                        {view === 'onboarding' && <Onboarding />}
                        {view === 'passport_result' && <PassportResult />}
                        {view === 'admin_home' && <AdminHome />}

                        {overlay === 'admin_verdict' && <AdminVerdict />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DptoLibreApp />);
    </script>
</body>
</html>
